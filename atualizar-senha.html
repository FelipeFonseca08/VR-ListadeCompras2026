<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Redefinir Senha • Cesta Livre</title>
    
    <link rel="stylesheet" href="src/css/login.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="src/icons/favicon.ico">
    
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card" id="resetCard">
            
            <div class="login-header">
                <div class="logo-wrapper">
                    <img id="logo" src="src/icons/icon-512x512.png" alt="Cesta Livre">
                </div>
                <h1 class="app-title">Cesta Livre</h1>
                <p class="app-subtitle">Crie uma nova senha para sua conta</p>
            </div>

            <form class="login-form" id="resetForm" onsubmit="return false;">
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-feather="lock" class="input-icon"></i>
                        <input 
                            type="password" 
                            id="novaSenha" 
                            class="form-input" 
                            placeholder=" " 
                            autocomplete="new-password"
                            required
                        >
                        <label for="novaSenha" class="form-label">Nova senha</label>
                        <button type="button" class="toggle-password" data-target="novaSenha" aria-label="Mostrar senha">
                            <i data-feather="eye-off" class="eye-icon eye-off"></i>
                            <i data-feather="eye" class="eye-icon eye-on"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-feather="check-circle" class="input-icon"></i>
                        <input 
                            type="password" 
                            id="confirmarSenha" 
                            class="form-input" 
                            placeholder=" " 
                            autocomplete="new-password"
                            required
                        >
                        <label for="confirmarSenha" class="form-label">Confirmar nova senha</label>
                        <button type="button" class="toggle-password" data-target="confirmarSenha" aria-label="Mostrar senha">
                            <i data-feather="eye-off" class="eye-icon eye-off"></i>
                            <i data-feather="eye" class="eye-icon eye-on"></i>
                        </button>
                    </div>
                </div>

                <div class="password-requirements" id="passwordRequirements">
                    <p class="requirements-title">Sua senha deve ter:</p>
                    <ul class="requirements-list">
                        <li class="requirement-item" id="reqLength">
                            <i data-feather="circle" class="req-icon"></i>
                            <span>Pelo menos 6 caracteres</span>
                        </li>
                        <li class="requirement-item" id="reqMatch">
                            <i data-feather="circle" class="req-icon"></i>
                            <span>Senhas iguais</span>
                        </li>
                    </ul>
                </div>

                <button id="btn-reset" class="btn-login" type="button">
                    <span class="btn-content">
                        <i data-feather="save" class="btn-icon"></i>
                        <span class="btn-text">Salvar nova senha</span>
                    </span>
                    <span class="btn-loader"></span>
                </button>

                <div id="mensagem" class="message-container"></div>

                <div class="divider-wrapper">
                    <span class="divider-line"></span>
                    <span class="divider-text">ou</span>
                    <span class="divider-line"></span>
                </div>

                <button type="button" class="btn-signup" id="btnVoltar">
                    <span class="btn-content">
                        <i data-feather="arrow-left" class="btn-icon"></i>
                        <span class="btn-text">Voltar para o login</span>
                    </span>
                </button>

            </form>
        </div>
        
        <div class="background-decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>

    <script type="module" src="reset-senha.js"></script>
    <script>
        feather.replace();
        
        document.addEventListener('DOMContentLoaded', function() {
            // ============================================
            // BOTÃO OLHO (MOSTRAR/OCULTAR SENHA)
            // ============================================
            document.querySelectorAll('.toggle-password').forEach(function(button) {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    var targetId = this.getAttribute('data-target');
                    var input = document.getElementById(targetId);
                    
                    if (!input) return;
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.classList.add('showing');
                        this.setAttribute('aria-label', 'Ocultar senha');
                    } else {
                        input.type = 'password';
                        this.classList.remove('showing');
                        this.setAttribute('aria-label', 'Mostrar senha');
                    }
                });
                
                button.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                });
            });
            
            // ============================================
            // BOTÕES
            // ============================================
            document.getElementById('btn-reset').addEventListener('click', function(e) {
                e.preventDefault();
                if (typeof window.atualizarSenha === 'function') window.atualizarSenha();
            });
            
            document.getElementById('btnVoltar').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'login.html';
            });
            
            var novaSenha = document.getElementById('novaSenha');
            var confirmarSenha = document.getElementById('confirmarSenha');
            
            novaSenha.addEventListener('input', function() {
                if (typeof window.validarRequisitos === 'function') window.validarRequisitos();
            });
            
            confirmarSenha.addEventListener('input', function() {
                if (typeof window.validarRequisitos === 'function') window.validarRequisitos();
            });
            
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    if (typeof window.atualizarSenha === 'function') window.atualizarSenha();
                }
            });
        });

        // ============================================
        // SERVICE WORKER COM TOAST PROFISSIONAL
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registrado:', registration.scope);
                        
                        if (registration.waiting) {
                            mostrarToastAtualizacao(registration);
                        }
                        
                        registration.addEventListener('updatefound', function() {
                            var newWorker = registration.installing;
                            newWorker.addEventListener('statechange', function() {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    mostrarToastAtualizacao(registration);
                                }
                            });
                        });
                    })
                    .catch(function(error) {
                        console.error('ServiceWorker erro:', error);
                    });
            });
        }
        
        function mostrarToastAtualizacao(registration) {
            var toastAntigo = document.getElementById('updateToast');
            if (toastAntigo) document.body.removeChild(toastAntigo);
            
            var toast = document.createElement('div');
            toast.id = 'updateToast';
            toast.style.cssText = 'position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: white; border-radius: 20px; padding: 0; box-shadow: 0 12px 40px rgba(0, 31, 84, 0.25); z-index: 9999; font-family: "Playpen Sans Arabic", cursive; max-width: 90%; width: 400px; animation: toastEntrada 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); overflow: hidden; border: 1px solid rgba(18, 130, 162, 0.2);';
            
            toast.innerHTML = '<div style="background: linear-gradient(135deg, #001F54, #034078); padding: 4px 0;"><div style="background: rgba(255,255,255,0.2); height: 3px; border-radius: 0 0 2px 2px;"></div></div><div style="padding: 24px 20px;"><div style="display: flex; align-items: flex-start; gap: 14px;"><div style="background: linear-gradient(135deg, #1282A2, #034078); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 12px rgba(18, 130, 162, 0.3);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></div><div style="flex: 1;"><h3 style="margin: 0 0 4px 0; font-size: 1rem; font-weight: 700; color: #1e293b;">Atualização disponível!</h3><p style="margin: 0; font-size: 0.85rem; color: #64748b; line-height: 1.5;">Uma nova versão do app está pronta.</p></div></div><div style="display: flex; gap: 10px; margin-top: 18px;"><button id="btnAtualizarAgora" style="flex: 1; padding: 12px 16px; background: linear-gradient(135deg, #034078, #001F54); color: white; border: none; border-radius: 12px; cursor: pointer; font-family: \'Playpen Sans Arabic\', cursive; font-size: 0.9rem; font-weight: 600; box-shadow: 0 4px 12px rgba(3, 64, 120, 0.3);">Atualizar agora</button><button id="btnDepoisAgora" style="padding: 12px 16px; background: transparent; color: #64748b; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-family: \'Playpen Sans Arabic\', cursive; font-size: 0.9rem; font-weight: 500;">Depois</button></div></div>';
            
            document.body.appendChild(toast);
            
            document.getElementById('btnAtualizarAgora').addEventListener('click', function() {
                if (registration.waiting) registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                document.body.removeChild(toast);
                window.location.reload();
            });
            
            document.getElementById('btnDepoisAgora').addEventListener('click', function() {
                document.body.removeChild(toast);
            });
            
            if (!document.getElementById('toastStyles')) {
                var style = document.createElement('style');
                style.id = 'toastStyles';
                style.textContent = '@keyframes toastEntrada { from { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }';
                document.head.appendChild(style);
            }
        }
    </script>
</body>
</html>
