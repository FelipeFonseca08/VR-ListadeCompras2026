<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesta Livre</title>

    <link rel="stylesheet" href="login.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
</head>

<body>

    <div class="container">

        <img class="logo" src="src/icons/icon-512x512.png" alt="Logo">

        <h1>Entrar</h1>
        <p class="subtitle">Acesse sua lista compartilhada</p>

        <!-- LOGIN COM GOOGLE -->
        <button class="btn-google" onclick="loginGoogle()">
            Continuar com Google
        </button>

        <div class="divider">ou</div>

        <!-- LOGIN NORMAL -->
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">

        <span id="erro" class="erro"></span>

        <button id="btn-login" class="btn-primary" onclick="login()">
            Entrar
        </button>

        <button class="btn-secondary" onclick="cadastro()">
            Criar conta
        </button>

    </div>

    <script type="module" src="auth.js"></script>

</body>
</html>
