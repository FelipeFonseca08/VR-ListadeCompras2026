<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesta Livre</title>
    <link rel="stylesheet" href="src/css/index.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <img id="logo" src="src/icons/icon-512x512.png" alt="Cesta Livre">
        <h1 class="titulo">Sua Lista de Compras</h1>
        <ul id="lista"></ul>
        <input type="text" id="item" placeholder="Novo item">
        <button onclick="adicionarItem()">Adicionar</button>
        <button onclick="logout()">Sair da Lista</button>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                        
                        // Verifica se há atualização disponível
                        registration.addEventListener('updatefound', function() {
                            var newWorker = registration.installing;
                            newWorker.addEventListener('statechange', function() {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Nova versão disponível! Recarregue a página.');
                                }
                            });
                        });
                    })
                    .catch(function(error) {
                        console.error('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
